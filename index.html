<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 max-w-md w-full p-8">
        <h1 class="text-2xl font-semibold text-slate-800 mb-2">Iris Flower Predictor</h1>
        <p class="text-sm text-slate-500 mb-6">Provide the measurements below to classify the flower species.</p>

        <form id="predictionForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-slate-600 uppercase tracking-wider mb-1">Sepal Length (cm)</label>
                <input type="number" step="0.1" name="sepal_length" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-600 uppercase tracking-wider mb-1">Sepal Width (cm)</label>
                <input type="number" step="0.1" name="sepal_width" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-600 uppercase tracking-wider mb-1">Petal Length (cm)</label>
                <input type="number" step="0.1" name="petal_length" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-indigo-500 transition">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-600 uppercase tracking-wider mb-1">Petal Width (cm)</label>
                <input type="number" step="0.1" name="petal_width" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-indigo-500 transition">
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg text-sm transition shadow-sm mt-2">
                Classify Flower
            </button>
        </form>

        <div id="resultBox" class="hidden mt-6 p-4 rounded-xl border text-center transition">
            <p id="resultText" class="text-base font-medium"></p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            
            // Collect form input parameters
            const formData = new FormData(e.target);
            const payload = {
                sepal_length: parseFloat(formData.get('sepal_length')),
                sepal_width: parseFloat(formData.get('sepal_width')),
                petal_length: parseFloat(formData.get('petal_length')),
                petal_width: parseFloat(formData.get('petal_width'))
            };

            try {
                // Post directly back to our Flask endpoint relatively
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                resultBox.classList.remove('hidden', 'bg-red-50', 'border-red-100', 'bg-emerald-50', 'border-emerald-100');
                
                if (response.ok) {
                    resultBox.classList.add('bg-emerald-50', 'border-emerald-100');
                    resultText.className = "text-emerald-800 font-semibold text-lg";
                    resultText.innerText = `Prediction: ${data.class}`;
                } else {
                    throw new Error(data.error || 'Server processing error');
                }
            } catch (err) {
                resultBox.classList.add('bg-red-50', 'border-red-100');
                resultText.className = "text-red-800 font-medium text-sm";
                resultText.innerText = `Error: ${err.message}`;
            }
        });
    </script>
</body>
</html>
